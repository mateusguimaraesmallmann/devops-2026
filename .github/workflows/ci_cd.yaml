name: "Exemplo pipeline"

on:
  workflow_dispatch:
  push: 
    branches: [main]

jobs:
  integracao-continua:
    runs-on: ubuntu-latest
    env:
      FLASK_APP: aplicacao.app:APP
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Instalação de dependências
        run: pip install -r requirements.txt
      - name: Migração
        run: |
          flask db init
          flask db migrate -m "First"
          flask db upgrade
      - name: Testes unitários
        run: pytest aplicacao/
  estagio02:
    needs: integracao-continua
    runs-on: ubuntu-latest
    steps:
      - name: "Sleep"
        run: sleep 5
  estagio03:
    needs: estagio02
    runs-on: ubuntu-latest
    steps:
      - name: "Sleep"
        run: sleep 2